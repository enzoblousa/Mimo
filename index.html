<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimmo — Cerâmica feita à mão</title>
    <meta
      name="description"
      content="Catálogo de peças de cerâmica feitas à mão pela Mimmo: vasos, xícaras e peças decorativas, disponíveis ou sob encomenda."
    />
    <meta property="og:title" content="Mimmo — Cerâmica feita à mão" />
    <meta
      property="og:description"
      content="Catálogo de peças de cerâmica feitas à mão, com carinho, peça por peça."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <!-- og:image fica pendente até haver fotos reais e deploy público
         (ADR-0006) — uma URL relativa ou de placeholder não funciona bem
         compartilhada em redes sociais. -->
    <link rel="icon" type="image/jpeg" href="assets/imagens/site/logo.jpeg" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/componentes.css" />
  </head>
  <body>
    <header class="cabecalho">
      <div class="cabecalho__conteudo container">
        <a href="index.html" class="logo">
          <img src="assets/imagens/site/logo.jpeg" data-nome-loja alt="Mimmo" />
        </a>

        <button
          class="botao-menu"
          type="button"
          data-botao-menu
          aria-expanded="false"
          aria-controls="nav-principal"
        >
          <span class="sr-only">Abrir menu</span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
        </button>

        <nav
          class="nav"
          id="nav-principal"
          data-nav
          aria-label="Navegação principal"
        >
          <a href="sobre.html">Sobre</a>
          <a href="#catalogo">Catálogo</a>
          <a href="#" data-link-instagram target="_blank" rel="noopener noreferrer">Instagram</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero__disco" aria-hidden="true"></div>
        <div class="hero__disco hero__disco--interno" aria-hidden="true"></div>
        <div class="container hero__conteudo">
          <h1 data-nome-loja>Mimmo</h1>
          <p class="hero__posicionamento" data-posicionamento>
            Cerâmica feita à mão, com carinho, peça por peça
          </p>
          <div class="hero__acoes">
            <a href="#catalogo" class="botao botao--primario">Ver catálogo</a>
          </div>
        </div>
      </section>

      <div class="divisor-argila" aria-hidden="true"></div>

      <section class="catalogo" id="catalogo">
        <div class="container">
          <div class="catalogo__cabecalho">
            <span class="etiqueta">Catálogo</span>
            <!-- <h2>Peças disponíveis e sob encomenda</h2> -->
          </div>

          <div class="filtros">
            <div class="filtros__lista" data-lista-filtros></div>
            <input
              type="search"
              class="campo-busca"
              data-campo-busca
              placeholder="Buscar peça..."
              aria-label="Buscar peça pelo nome ou descrição"
            />
          </div>

          <div class="grade-produtos" data-grade-catalogo></div>
          <p class="catalogo-vazio" data-catalogo-vazio hidden>
            Nenhuma peça encontrada para sua busca.
          </p>
        </div>
      </section>
    </main>

    <footer class="rodape">
      <div class="container rodape__conteudo">
        <p>&copy; 2026 <span data-nome-loja>Mimmo</span></p>
        <div class="rodape__links">
          <a href="#" data-link-instagram target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>
      </div>
    </footer>

    <dialog class="modal-produto" data-modal-produto aria-labelledby="modal-produto-titulo">
      <button type="button" class="modal-produto__fechar" data-modal-fechar aria-label="Fechar">
        &times;
      </button>

      <div class="modal-produto__galeria-principal">
        <img data-modal-imagem-principal alt="" />
      </div>

      <div class="modal-produto__miniaturas" data-modal-galeria></div>

      <div class="modal-produto__corpo">
        <p class="modal-produto__categoria" data-modal-categoria></p>
        <h2 id="modal-produto-titulo" data-modal-nome></h2>
        <p data-modal-descricao></p>

        <dl class="modal-produto__specs">
          <div data-modal-linha-medidas hidden>
            <dt>Medidas</dt>
            <dd data-valor></dd>
          </div>
        </dl>

        <span class="tag-preco" data-modal-preco></span>

        <a
          href="#"
          class="botao botao--primario"
          data-modal-contato
          target="_blank"
          rel="noopener noreferrer"
          >Tenho interesse</a
        >
      </div>
    </dialog>

    <script type="module" src="assets/js/inicio.js"></script>
  </body>
</html>
