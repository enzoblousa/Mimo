<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo — Mimmo</title>
    <meta
      name="description"
      content="Catálogo completo de peças de cerâmica feitas à mão pela Mimmo: filtre por categoria e veja detalhes de cada peça."
    />
    <meta property="og:title" content="Catálogo — Mimmo" />
    <meta
      property="og:description"
      content="Peças de cerâmica feitas à mão, disponíveis ou sob encomenda."
    />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/componentes.css" />
  </head>
  <body>
    <header class="cabecalho">
      <div class="cabecalho__conteudo container">
        <a href="index.html" class="logo" data-nome-loja>Mimmo</a>

        <button
          class="botao-menu"
          type="button"
          data-botao-menu
          aria-expanded="false"
          aria-controls="nav-principal"
        >
          <span class="sr-only">Abrir menu</span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
        </button>

        <nav
          class="nav"
          id="nav-principal"
          data-nav
          aria-label="Navegação principal"
        >
          <a href="catalogo.html">Catálogo</a>
          <a href="index.html#sobre">Sobre</a>
          <a href="#" data-link-instagram target="_blank" rel="noopener noreferrer">Instagram</a>
          <a href="#" data-link-whatsapp target="_blank" rel="noopener noreferrer">WhatsApp</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="catalogo">
        <div class="container">
          <div class="catalogo__cabecalho">
            <h1>Catálogo</h1>
            <p>Todas as peças da Mimmo, feitas à mão, uma de cada vez.</p>
          </div>

          <div class="filtros">
            <div class="filtros__lista" data-lista-filtros></div>
            <input
              type="search"
              class="campo-busca"
              data-campo-busca
              placeholder="Buscar peça..."
              aria-label="Buscar peça pelo nome ou descrição"
            />
          </div>

          <div class="grade-produtos" data-grade-catalogo></div>
          <p class="catalogo-vazio" data-catalogo-vazio hidden>
            Nenhuma peça encontrada para sua busca.
          </p>
        </div>
      </section>
    </main>

    <footer class="rodape">
      <div class="container rodape__conteudo">
        <p>&copy; 2026 <span data-nome-loja>Mimmo</span> — feito com carinho.</p>
        <div class="rodape__links">
          <a href="#" data-link-instagram target="_blank" rel="noopener noreferrer">Instagram</a>
          <a href="#" data-link-whatsapp target="_blank" rel="noopener noreferrer">WhatsApp</a>
        </div>
      </div>
    </footer>

    <dialog class="modal-produto" data-modal-produto aria-labelledby="modal-produto-titulo">
      <button type="button" class="modal-produto__fechar" data-modal-fechar aria-label="Fechar">
        &times;
      </button>

      <div class="modal-produto__galeria-principal">
        <img data-modal-imagem-principal alt="" />
        <span class="selo" data-modal-selo></span>
      </div>

      <div class="modal-produto__miniaturas" data-modal-galeria></div>

      <div class="modal-produto__corpo">
        <h2 id="modal-produto-titulo" data-modal-nome></h2>
        <p class="modal-produto__categoria" data-modal-categoria></p>
        <p data-modal-descricao></p>

        <dl class="modal-produto__specs">
          <div data-modal-linha-medidas hidden>
            <dt>Medidas</dt>
            <dd data-valor></dd>
          </div>
          <div data-modal-linha-tecnica hidden>
            <dt>Técnica</dt>
            <dd data-valor></dd>
          </div>
        </dl>

        <span class="tag-preco" data-modal-preco></span>

        <a
          href="#"
          class="botao botao--primario"
          data-modal-contato
          target="_blank"
          rel="noopener noreferrer"
          >Perguntar sobre esta peça</a
        >
      </div>
    </dialog>

    <script type="module" src="assets/js/catalogo.js"></script>
  </body>
</html>
