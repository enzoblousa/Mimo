<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sobre — Mimmo</title>
    <meta
      name="description"
      content="Conheça a Flávia Mangabeira e a história por trás da Mimmo, cerâmica feita à mão com carinho, peça por peça."
    />
    <meta property="og:title" content="Sobre — Mimmo" />
    <meta
      property="og:description"
      content="Conheça a Flávia Mangabeira e a história por trás da Mimmo."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <!-- og:image fica pendente até haver fotos reais e deploy público
         (ADR-0006) — uma URL relativa ou de placeholder não funciona bem
         compartilhada em redes sociais. -->
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/componentes.css" />
  </head>
  <body>
    <header class="cabecalho">
      <div class="cabecalho__conteudo container">
        <a href="index.html" class="logo" data-nome-loja>Mimmo</a>

        <button
          class="botao-menu"
          type="button"
          data-botao-menu
          aria-expanded="false"
          aria-controls="nav-principal"
        >
          <span class="sr-only">Abrir menu</span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
          <span class="botao-menu__linha" aria-hidden="true"></span>
        </button>

        <nav
          class="nav"
          id="nav-principal"
          data-nav
          aria-label="Navegação principal"
        >
          <a href="sobre.html">Sobre</a>
          <a href="index.html#catalogo">Catálogo</a>
          <a href="#" data-link-instagram target="_blank" rel="noopener noreferrer">Instagram</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="sobre" id="sobre">
        <div class="container sobre__conteudo">
          <span class="etiqueta">Sobre</span>
          <h1>Sobre a <span data-nome-loja>Mimmo</span></h1>
          <div data-sobre-texto></div>
          <span class="sobre__assinatura">Flávia Mangabeira</span>
        </div>
      </section>
    </main>

    <footer class="rodape">
      <div class="container rodape__conteudo">
        <p>&copy; 2026 <span data-nome-loja>Mimmo</span> — feito com carinho.</p>
        <div class="rodape__links">
          <a href="#" data-link-instagram target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>
      </div>
    </footer>

    <script type="module" src="assets/js/sobre.js"></script>
  </body>
</html>
